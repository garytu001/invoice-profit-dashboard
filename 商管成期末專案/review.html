<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice Review</title>
  <style>
    :root {
      --bg: #f7f7f2;
      --panel: #ffffff;
      --text: #1e1f22;
      --muted: #666b73;
      --line: #d7d9df;
      --brand: #2f6fed;
      --warn: #a36a00;
    }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, #f4f5ef, #f9fbff);
    }
    .wrap {
      max-width: 1280px;
      margin: 24px auto;
      padding: 0 16px 40px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }
    h1 { margin: 0 0 8px; font-size: 24px; }
    .muted { color: var(--muted); }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    input, button {
      font-size: 14px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    button {
      cursor: pointer;
      background: var(--brand);
      color: #fff;
      border: none;
    }
    button.secondary { background: #5b6470; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 8px;
    }
    .table-wrap { overflow: auto; max-height: 68vh; border: 1px solid var(--line); border-radius: 10px; }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px;
      text-align: left;
      vertical-align: middle;
    }
    tbody tr:nth-child(even) { background: #fcfdff; }
    th {
      background: #f3f6fb;
      position: sticky;
      top: 0;
      z-index: 2;
      white-space: nowrap;
    }
    td input, td select {
      width: 100%;
      box-sizing: border-box;
      height: 36px;
      border: 1px solid #d5d7dc;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      padding: 6px 8px;
    }
    td.num input {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    td.unit select {
      min-width: 78px;
      font-weight: 600;
    }
    td.preview {
      white-space: nowrap;
      font-weight: 600;
      color: #1f3f7a;
    }
    .warn {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #fff6e8;
      color: var(--warn);
      font-size: 12px;
      margin: 2px 4px 2px 0;
      white-space: nowrap;
    }
    .status { font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>請款單人工覆核</h1>
      <div class="muted">先解析，再逐筆確認或修改，最後才入庫。</div>
      <div class="row" style="margin-top: 10px;">
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/gif,image/webp,.jpg,.jpeg,.png,.gif,.webp" />
        <button id="parseBtn">解析預覽</button>
        <button id="saveBtn" class="secondary" disabled>確認入庫</button>
      </div>
      <hr style="border: none; border-top: 1px solid var(--line); margin: 12px 0;" />
      <div class="muted">或直接載入已產出的 JSON 後人工複審</div>
      <div class="row" style="margin-top: 10px;">
        <input type="file" id="jsonFileInput" accept=".json,application/json" />
        <button id="loadJsonBtn" class="secondary">載入 JSON</button>
      </div>
      <div style="margin-top:8px;">
        <textarea id="jsonText" placeholder='可直接貼 JSON（支援 {"parsed": {...}} 或直接 {...}）'
          style="width:100%; min-height:120px; box-sizing:border-box; border:1px solid var(--line); border-radius:8px; padding:8px; font-size:12px;"></textarea>
      </div>
      <div id="status" class="status muted"></div>
    </div>

    <div class="card">
      <div class="grid">
        <label>印表日期 <input id="print_date" /></label>
        <label>請款起 <input id="period_start" /></label>
        <label>請款迄 <input id="period_end" /></label>
        <label>客戶名稱 <input id="customer_name" /></label>
      </div>
    </div>

    <div class="card">
      <div class="row" style="justify-content: space-between;">
        <strong>明細資料</strong>
        <button id="addRowBtn" class="secondary">新增一列</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>入庫</th>
              <th>類型</th>
              <th>日期</th>
              <th>單號</th>
              <th>品名</th>
              <th>等級</th>
              <th>規格</th>
              <th>數量</th>
              <th>數值</th>
              <th>單位</th>
              <th>顯示</th>
              <th>單價</th>
              <th>金額</th>
              <th>警示</th>
              <th>刪除</th>
            </tr>
          </thead>
          <tbody id="itemsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let currentParsed = null;
    let currentFilename = "manual-review";

    const byId = (id) => document.getElementById(id);
    const statusEl = byId("status");
    const itemsBody = byId("itemsBody");

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.style.color = isError ? "#b00020" : "#46505a";
    }

    function esc(s) {
      return String(s ?? "").replace(/"/g, "&quot;");
    }

    function renderItems(items) {
      itemsBody.innerHTML = "";
      items.forEach((it, idx) => {
        const tr = document.createElement("tr");
        const warns = Array.isArray(it.warnings) ? it.warnings : [];
        const warnHtml = warns.length
          ? warns.map((w) => `<span class="warn">${esc(w)}</span>`).join("")
          : "";
        const measurePreview = `${it.measure_value ?? ""}${it.measure_unit ?? ""}`;
        tr.innerHTML = `
          <td><input type="checkbox" data-k="enabled" checked /></td>
          <td>
            <select data-k="line_type">
              <option value="sale" ${it.line_type === "sale" ? "selected" : ""}>sale</option>
              <option value="return" ${it.line_type === "return" ? "selected" : ""}>return</option>
            </select>
          </td>
          <td><input data-k="date" value="${esc(it.date)}" /></td>
          <td><input data-k="order_no" value="${esc(it.order_no)}" /></td>
          <td><input data-k="product" value="${esc(it.product)}" /></td>
          <td><input data-k="grade" value="${esc(it.grade)}" /></td>
          <td><input data-k="spec" value="${esc(it.spec)}" /></td>
          <td class="num"><input data-k="qty" type="number" step="any" value="${esc(it.qty)}" /></td>
          <td class="num"><input data-k="measure_value" type="number" step="any" value="${esc(it.measure_value)}" /></td>
          <td class="unit">
            <select data-k="measure_unit">
              <option value="" ${!it.measure_unit ? "selected" : ""}>null</option>
              <option value="才" ${it.measure_unit === "才" ? "selected" : ""}>才</option>
              <option value="坪" ${it.measure_unit === "坪" ? "selected" : ""}>坪</option>
            </select>
          </td>
          <td class="preview" data-k="measure_preview">${esc(measurePreview)}</td>
          <td class="num"><input data-k="unit_price" type="number" step="any" value="${esc(it.unit_price)}" /></td>
          <td class="num"><input data-k="amount" type="number" step="any" value="${esc(it.amount)}" /></td>
          <td>${warnHtml}</td>
          <td><button type="button" class="secondary" data-k="remove">刪</button></td>
        `;
        tr.dataset.idx = String(idx);
        itemsBody.appendChild(tr);
      });
    }

    function hydrateFromParsed(parsed) {
      currentParsed = parsed || {};
      byId("print_date").value = currentParsed.print_date || "";
      byId("period_start").value = currentParsed.period_start || "";
      byId("period_end").value = currentParsed.period_end || "";
      byId("customer_name").value = currentParsed.customer_name || "";
      renderItems(currentParsed.items || []);
      byId("saveBtn").disabled = false;
    }

    function rowToItem(tr) {
      const get = (k) => tr.querySelector(`[data-k="${k}"]`);
      const num = (k) => {
        const v = get(k).value;
        return v === "" ? null : Number(v);
      };
      return {
        line_type: get("line_type").value || "sale",
        date: get("date").value || null,
        order_no: get("order_no").value || null,
        product: get("product").value || null,
        grade: get("grade").value || null,
        spec: get("spec").value || null,
        qty: num("qty"),
        measure_value: num("measure_value"),
        measure_unit: get("measure_unit").value || null,
        unit_price: num("unit_price"),
        amount: num("amount"),
      };
    }

    function collectParsed() {
      const rows = Array.from(itemsBody.querySelectorAll("tr"));
      const items = rows
        .filter((tr) => tr.querySelector('[data-k="enabled"]').checked)
        .map(rowToItem);
      return {
        print_date: byId("print_date").value || null,
        period_start: byId("period_start").value || null,
        period_end: byId("period_end").value || null,
        customer_name: byId("customer_name").value || null,
        raw_lines: currentParsed?.raw_lines || [],
        items: items,
      };
    }

    byId("parseBtn").addEventListener("click", async () => {
      const file = byId("fileInput").files[0];
      if (!file) {
        setStatus("請先選擇檔案", true);
        return;
      }
      setStatus("解析中...");
      currentFilename = file.name;

      const form = new FormData();
      form.append("file", file);

      try {
        const resp = await fetch("/api/parse-preview", { method: "POST", body: form });
        if (!resp.ok) throw new Error(await resp.text());
        const data = await resp.json();
        hydrateFromParsed(data.parsed);
        setStatus(`解析完成：${data.item_count} 筆（raw_lines ${data.raw_lines_count}）`);
      } catch (e) {
        setStatus(`解析失敗：${e.message}`, true);
      }
    });

    byId("loadJsonBtn").addEventListener("click", async () => {
      try {
        let raw = byId("jsonText").value.trim();
        const file = byId("jsonFileInput").files[0];

        if (!raw && file) {
          raw = await file.text();
          currentFilename = file.name;
        }

        if (!raw) {
          setStatus("請先貼上 JSON 或選擇 JSON 檔案", true);
          return;
        }

        const obj = JSON.parse(raw);
        const parsed = obj.parsed ?? obj;
        if (!parsed || !Array.isArray(parsed.items)) {
          throw new Error("JSON 格式不符，需包含 parsed.items 陣列");
        }

        if (obj.source_filename) {
          currentFilename = obj.source_filename;
        } else if (!currentFilename) {
          currentFilename = "manual-json-review";
        }

        hydrateFromParsed(parsed);
        setStatus(`JSON 載入完成：${parsed.items.length} 筆，可開始複審`);
      } catch (e) {
        setStatus(`載入 JSON 失敗：${e.message}`, true);
      }
    });

    byId("saveBtn").addEventListener("click", async () => {
      if (!currentParsed) {
        setStatus("尚未解析，無法入庫", true);
        return;
      }
      setStatus("入庫中...");

      try {
        const payload = {
          source_filename: currentFilename,
          parsed: collectParsed(),
        };
        const resp = await fetch("/api/confirm", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!resp.ok) throw new Error(await resp.text());
        const data = await resp.json();
        setStatus(`已入庫成功，invoice_id=${data.invoice_id}，共 ${data.item_count} 筆`);
      } catch (e) {
        setStatus(`入庫失敗：${e.message}`, true);
      }
    });

    byId("addRowBtn").addEventListener("click", () => {
      const items = currentParsed?.items ? [...currentParsed.items] : [];
      items.push({
        line_type: "sale",
        date: null,
        order_no: null,
        product: null,
        grade: null,
        spec: null,
        qty: null,
        measure_value: null,
        measure_unit: null,
        unit_price: null,
        amount: null,
        warnings: [],
      });
      if (!currentParsed) currentParsed = { raw_lines: [], items: [] };
      currentParsed.items = items;
      renderItems(items);
      byId("saveBtn").disabled = false;
    });

    itemsBody.addEventListener("click", (e) => {
      const target = e.target;
      if (!(target instanceof HTMLElement)) return;
      if (target.getAttribute("data-k") !== "remove") return;
      const tr = target.closest("tr");
      if (tr) tr.remove();
    });

    itemsBody.addEventListener("input", (e) => {
      const target = e.target;
      if (!(target instanceof HTMLElement)) return;
      const tr = target.closest("tr");
      if (!tr) return;
      const vEl = tr.querySelector('[data-k="measure_value"]');
      const uEl = tr.querySelector('[data-k="measure_unit"]');
      const pEl = tr.querySelector('[data-k="measure_preview"]');
      if (!vEl || !uEl || !pEl) return;
      pEl.textContent = `${vEl.value || ""}${uEl.value || ""}`;
    });
  </script>
</body>
</html>
